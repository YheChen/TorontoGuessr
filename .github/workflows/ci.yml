name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so rapid pushes to a PR do not pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run build --workspace backend
      - name: Unit tests
        run: npm run test --workspace backend

  frontend:
    name: Frontend checks and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck --workspace frontend
      - name: Lint
        run: npm run lint --workspace frontend
      - name: Unit tests
        run: npm run test --workspace frontend
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          # Rebuild the cache when deps or source change; otherwise reuse the
          # newest cache for this lockfile so compilation stays incremental.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('frontend/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Production build (includes type checking)
        run: npm run build --workspace frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://toronto-guessr-backend.vercel.app/api
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-placeholder-key
